<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UY Import Ops — Hunter Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{slate:{850:'#151e2e',900:'#0f172a',950:'#020617'},brand:{400:'#38bdf8',500:'#0ea5e9',600:'#0284c7'},accent:{400:'#4ade80',500:'#22c55e'}}}}}</script>
<style>
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0}
.glass{background:rgba(30,41,59,.7);backdrop-filter:blur(12px);border:1px solid rgba(148,163,184,.1)}
.card{background:rgba(30,41,59,.5);border:1px solid rgba(148,163,184,.08);border-radius:1rem;padding:1.5rem}
.btn{padding:.5rem 1rem;border-radius:.5rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#0284c7;color:#fff}.btn-primary:hover{background:#0369a1}
input,select{border-radius:.5rem;padding:.5rem .75rem;background:rgba(30,41,59,.8);border:1px solid rgba(148,163,184,.2);color:#e2e8f0;outline:none}
input:focus,select:focus{border-color:#0ea5e9}
.nav-btn{cursor:pointer;padding:.75rem 1rem;border-radius:.75rem;transition:all .2s}
.nav-btn:hover{background:rgba(30,41,59,.8)}.nav-btn.active{background:rgba(2,132,199,.15);color:#38bdf8}
.tab{display:none}.tab.active{display:block}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(148,163,184,.2);border-top-color:#38bdf8;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body class="min-h-screen">
<div class="flex h-screen">
  <!-- Sidebar -->
  <aside class="w-64 flex-shrink-0 border-r border-slate-700/50 p-4 flex flex-col" style="background:rgba(15,23,42,.95)">
    <div class="text-xl font-bold mb-6 px-3">UYHunter</div>
    <nav class="flex-1 space-y-1">
      <div class="nav-btn active" onclick="switchTab('dashboard')" id="nav-dashboard">🎯 Dashboard</div>
      <div class="nav-btn" onclick="switchTab('hunter')" id="nav-hunter">🤖 Product Hunter</div>
      <div class="nav-btn" onclick="switchTab('products')" id="nav-products">📦 Productos</div>
    </nav>
    <div class="text-xs text-slate-500 px-3 pt-4">Hunter API v2</div>
  </aside>
  
  <!-- Main -->
  <main class="flex-1 overflow-auto p-6">
    <!-- Dashboard Tab -->
    <div class="tab active" id="tab-dashboard">
      <h2 class="text-2xl font-bold mb-1">Dashboard</h2>
      <p class="text-slate-400 mb-6">Resumen de tu operación de importación</p>
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="card"><div class="text-slate-400 text-sm">Total Productos</div><div class="text-3xl font-bold mt-1" id="stat-total">-</div></div>
        <div class="card"><div class="text-slate-400 text-sm">Precio Promedio</div><div class="text-3xl font-bold mt-1" id="stat-avg">-</div></div>
        <div class="card"><div class="text-slate-400 text-sm">Fuentes</div><div class="text-3xl font-bold mt-1" id="stat-sources">-</div></div>
      </div>
      <button class="btn btn-primary" onclick="switchTab('hunter')">🚀 Lanzar Hunter</button>
    </div>
    
    <!-- Hunter Tab -->
    <div class="tab" id="tab-hunter">
      <h2 class="text-2xl font-bold mb-1">Product Hunter</h2>
      <p class="text-slate-400 mb-6">Descubrí productos ganadores en Banggood</p>
      <div class="card mb-6">
        <div class="flex gap-3 items-end flex-wrap">
          <div class="flex-1 min-w-[200px]">
            <label class="block text-sm text-slate-400 mb-1">Keywords</label>
            <input type="text" id="hunter-kw" value="auriculares bluetooth" class="w-full" placeholder="Ej: smartwatch, lámpara led...">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Precio min $</label>
            <input type="number" id="hunter-min" value="0" class="w-28" step="0.01">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Precio max $</label>
            <input type="number" id="hunter-max" value="" class="w-28" step="0.01" placeholder="∞">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Cantidad</label>
            <select id="hunter-limit"><option>5</option><option selected>10</option><option>20</option><option>50</option></select>
          </div>
          <button class="btn btn-primary" onclick="runHunter()" id="hunter-btn">🔍 Buscar</button>
        </div>
      </div>
      <div id="hunter-status" class="mb-4"></div>
      <div id="hunter-results" class="space-y-3"></div>
    </div>
    
    <!-- Products Tab -->
    <div class="tab" id="tab-products">
      <h2 class="text-2xl font-bold mb-1">Productos</h2>
      <p class="text-slate-400 mb-6">Pipeline de productos encontrados</p>
      <div id="products-list" class="space-y-3"></div>
    </div>
  </main>
</div>

<script>
// ════ API ════
const API = '/api';

// ════ Tab switching ════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'dashboard') loadStats();
  if (name === 'products') loadProducts();
}

// ════ Dashboard ════
async function loadStats() {
  try {
    const r = await fetch(API + '/stats');
    const d = await r.json();
    document.getElementById('stat-total').textContent = d.total_products || 0;
    document.getElementById('stat-avg').textContent = '$' + (d.avg_price_usd || 0).toFixed(2);
    const sources = d.by_source ? Object.keys(d.by_source).length : 0;
    document.getElementById('stat-sources').textContent = sources;
  } catch(e) { console.error(e); }
}

// ════ Hunter ════
async function runHunter() {
  const btn = document.getElementById('hunter-btn');
  const results = document.getElementById('hunter-results');
  const status = document.getElementById('hunter-status');
  
  btn.disabled = true;
  btn.textContent = '🔍 Buscando...';
  status.innerHTML = '<div class="spinner"></div> Buscando productos...';
  results.innerHTML = '';
  
  try {
    const body = {
      keywords: document.getElementById('hunter-kw').value,
      max_products: parseInt(document.getElementById('hunter-limit').value)
    };
    const min = parseFloat(document.getElementById('hunter-min').value);
    const max = parseFloat(document.getElementById('hunter-max').value);
    if (min > 0) body.min_price = min;
    if (max > 0) body.max_price = max;
    
    const r = await fetch(API + '/hunter/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    
    if (d.success === false) {
      status.innerHTML = '<span style="color:#f87171">Error: ' + (d.error || 'desconocido') + '</span>';
    } else {
      status.innerHTML = '<span style="color:#4ade80">✓ ' + d.added + ' productos encontrados</span>';
      
      d.products.forEach(p => {
        results.innerHTML += `<div class="card flex justify-between items-start">
          <div class="flex-1">
            <a href="${p.url}" target="_blank" class="text-brand-400 hover:underline font-semibold">${p.title}</a>
            <div class="text-xs text-slate-500 mt-1">ID: ${p.product_id} · ${p.source}</div>
          </div>
          <div class="text-xl font-bold text-accent-400 ml-4">$${p.price_usd.toFixed(2)}</div>
        </div>`;
      });
    }
  } catch(e) {
    status.innerHTML = '<span style="color:#f87171">Error: ' + e.message + '</span>';
  }
  
  btn.disabled = false;
  btn.textContent = '🔍 Buscar';
}

// ════ Products ════
async function loadProducts() {
  const list = document.getElementById('products-list');
  list.innerHTML = '<div class="spinner"></div> Cargando...';
  try {
    const r = await fetch(API + '/products?limit=50');
    const products = await r.json();
    if (!products.length) {
      list.innerHTML = '<div class="card text-slate-400">No hay productos todavía. Usá el Hunter para buscar.</div>';
      return;
    }
    list.innerHTML = products.map(p => 
      `<div class="card flex justify-between items-start">
        <div class="flex-1">
          <div class="font-semibold">${p.name || 'Sin nombre'}</div>
          <div class="text-xs text-slate-500">${p.source || ''} · ${p.created_at || ''}</div>
        </div>
        <div class="text-lg font-bold text-accent-400">$${(p.product_cost_usd || 0).toFixed(2)}</div>
      </div>`
    ).join('');
  } catch(e) {
    list.innerHTML = '<span style="color:#f87171">Error: ' + e.message + '</span>';
  }
}

// ════ Init ════
loadStats();
</script>
</body>
</html>
